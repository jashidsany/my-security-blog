baseURL = "https://jashidsany.com/"
languageCode = "en-us"
title = "Jashid Sany"
theme = "PaperMod"

[params]
  defaultTheme = "dark"
  showReadingTime = true
  showShareButtons = false
  showPostNavLinks = true
  showBreadCrumbs = true
  showCodeCopyButtons = true
  mainSections = ["hackthebox", "malware-dev", "security-research", "exploit-dev", "tools"]

  [params.profileMode]
    enabled = true
    title = "Jashid Sany"
    subtitle = "Security researcher and malware developer. Offensive security, Windows internals, and AI coding tool vulnerability research."
    imageUrl = "/images/profile.jpg"
    imageWidth = 160
    imageHeight = 160
    imageTitle = "Jashid Sany"

    [[params.profileMode.buttons]]
      name = "Security Research"
      url = "/security-research/"
    [[params.profileMode.buttons]]
      name = "Malware Dev"
      url = "/malware-dev/"
    [[params.profileMode.buttons]]
      name = "HackTheBox"
      url = "/hackthebox/"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/jashidsany"
  [[params.socialIcons]]
    name = "linkedin"
    url = "https://linkedin.com/in/jashidsany"

