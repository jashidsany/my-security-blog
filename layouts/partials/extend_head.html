<style>
  .nav, .header, .header nav, #menu { overflow: visible !important; }
  #menu > li { position: relative; }

  #menu > li.dropdown > ul.dropdown-menu {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    background: #0d0d0d;
    border: 1px solid #1a1a1a;
    border-radius: 8px;
    padding: 6px 0;
    min-width: 190px;
    z-index: 9999;
    list-style: none;
    margin: 0;
    text-align: left !important;
    transform: none !important;
  }

  li.dropdown::after {
    content: "";
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    height: 10px;
    display: none;
  }
  li.dropdown.open::after { display: block; }

  #menu > li.dropdown > ul.dropdown-menu.show { display: block !important; }

  #menu > li.dropdown > ul.dropdown-menu > li {
    display: block !important;
    margin: 0 !important;
    padding: 0 !important;
    text-align: left !important;
    list-style: none !important;
  }

  #menu > li.dropdown > ul.dropdown-menu > li > a {
    display: block !important;
    padding: 6px 16px !important;
    text-align: left !important;
    color: #8a8a8a !important;
    font-size: 0.85rem !important;
    text-decoration: none !important;
    white-space: nowrap !important;
    line-height: 1.4 !important;
    margin: 0 !important;
  }

  #menu > li.dropdown > ul.dropdown-menu > li > a:hover {
    color: #e85044 !important;
    background: #141414 !important;
  }

  .dropdown-arrow { transition: transform 0.2s ease; }
  .dropdown-arrow.rotated { transform: rotate(180deg); }
</style>
<script>
document.addEventListener('DOMContentLoaded', function() {
  var dropdowns = document.querySelectorAll('li.dropdown');
  dropdowns.forEach(function(dd) {
    var menu = dd.querySelector('.dropdown-menu');
    var arrow = dd.querySelector('.dropdown-arrow');
    if (!menu) return;
    var timeout;
    dd.addEventListener('mouseenter', function() {
      clearTimeout(timeout);
      dd.classList.add('open');
      menu.classList.add('show');
      if (arrow) arrow.classList.add('rotated');
    });
    dd.addEventListener('mouseleave', function() {
      timeout = setTimeout(function() {
        dd.classList.remove('open');
        menu.classList.remove('show');
        if (arrow) arrow.classList.remove('rotated');
      }, 150);
    });
  });
});
</script>
